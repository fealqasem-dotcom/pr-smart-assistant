<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<title>PR Smart Assistant</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>🤖 PR Smart Assistant</h1>

<p class="subtitle">
منصة ذكية لصناعة محتوى العلاقات العامة باحتراف
</p>

<form method="POST">

<label>اختر نوع الخدمة:</label>

<select name="mode">

<option value="press">
📰 كتابة بيان صحفي
</option>

<option value="customer">
💬 الرد على العملاء
</option>

<option value="formal">
📄 رد رسمي
</option>

<option value="ideas">
💡 أفكار حملات
</option>

<option value="crisis">
🚨 إدارة أزمة إعلامية
</option>

<option value="social">
📱 منشور سوشيال ميديا
</option>

<option value="email">
📧 بريد رسمي
</option>

</select>

<label>اكتب طلبك:</label>

<textarea
name="user_input"
placeholder="مثال: اكتب بيان صحفي عن إطلاق تطبيق سعودي جديد للعلاقات العامة"
></textarea>

<button type="submit">
✨ إنشاء المحتوى
</button>

<button type="reset" class="clear-btn">
🧹 مسح
</button>

</form>

{% if result %}
<div class="result">

<h3>
📌 النتيجة:
</h3>

<p id="resultText">
{{ result }}
</p>

<button onclick="copyResult()" type="button" class="copy-btn">
📋 نسخ النتيجة
</button>

</div>
{% endif %}

</div>

<script>
function copyResult() {
    const text = document.getElementById("resultText").innerText;
    navigator.clipboard.writeText(text);
    alert("تم نسخ النتيجة بنجاح");
}
</script>

</body>
</html>
